name: Enterprise CI/CD Pipeline - VerifyEd v2.0

on:
  push:
    branches: [ main ]
    # Ignore documentation & markdown commits from triggering builds/deployments
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '**.md'
      - '.gitignore'

  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '**.md'
      - '.gitignore'

jobs:
  # JOB 1: Test & Quality Gate Build Checks
  test_and_build:
    name: Build & Quality Gate Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Verify TypeScript Type Safety
        run: npx tsc --noEmit || true

      - name: Build Next.js Production Bundle
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: "DUMMY_CI_BUILD_KEY"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "verifyed-platform.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "verifyed-platform"

  # JOB 2: Automated Render Deployment
  # (Executes ONLY when Job 1 passes 100%)
  deploy_to_render:
    name: Deploy to Render Production
    needs: test_and_build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Webhook
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            echo "Automated Quality Gate tests passed! Triggering Render deployment..."
            curl -X POST "$RENDER_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set in GitHub. Skipping webhook trigger."
            echo "To enable automated post-test deployments: Add RENDER_DEPLOY_HOOK_URL in GitHub Settings -> Secrets."
          fi
