version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: verifyed-postgres
    restart: always
    environment:
      POSTGRES_USER: verifyed_admin
      POSTGRES_PASSWORD: verifyed_secret_password
      POSTGRES_DB: verifyed_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifyed_admin -d verifyed_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: verifyed-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: verifyed-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://verifyed_admin:verifyed_secret_password@postgres:5432/verifyed_production?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: verifyed-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
